<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>polaroid</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600&family=DM+Sans:wght@300;400;500&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
<style>
  :root {
    --cream: #FAF4E8;
    --paper: #FDFBF4;
    --ink: #2A2520;
    --ink-soft: #5C544B;
    --ink-faded: #9A8F80;
    --sage: #B5C4A4;
    --sage-deep: #94A684;
    --sage-shadow: #6F8163;
    --accent-warm: #C97D5D;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    height: 100vh;
    overflow: hidden;
    position: relative;
  }

  /* Paper grain */
  .paper-grain {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background-image:
      radial-gradient(ellipse at 15% 20%, rgba(201, 125, 93, 0.05) 0%, transparent 50%),
      radial-gradient(ellipse at 85% 75%, rgba(122, 142, 108, 0.06) 0%, transparent 50%);
  }
  .paper-grain::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='300'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch' seed='5'/><feColorMatrix values='0 0 0 0 0.18  0 0 0 0 0.15  0 0 0 0 0.12  0 0 0 0.55 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    background-size: 300px 300px;
    opacity: 0.45;
    mix-blend-mode: multiply;
  }
  .paper-grain::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='600' height='600'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.015' numOctaves='2' stitchTiles='stitch' seed='3'/><feColorMatrix values='0 0 0 0 0.85  0 0 0 0 0.78  0 0 0 0 0.65  0 0 0 0.3 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    background-size: 600px 600px;
    opacity: 0.45;
    mix-blend-mode: multiply;
  }

  /* Top LEFT controls — avoids overlap with iframe close button (top-right) */
  .top-controls {
    position: absolute;
    top: 16px;
    left: 16px;
    z-index: 10;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .icon-btn {
    background: transparent;
    border: 1.5px solid var(--ink-faded);
    color: var(--ink-soft);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    cursor: pointer;
    transition: all 0.2s ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .icon-btn:hover {
    border-color: var(--ink-soft);
    background: var(--paper);
  }
  .icon-btn svg { width: 18px; height: 18px; }
  .info-btn {
    font-style: italic;
    font-family: 'Lora', serif;
    font-size: 17px;
    font-weight: 500;
  }

  .info-popover {
    position: absolute;
    top: 48px;
    left: 44px; /* aligns under the i button, not the volume button */
    background: var(--paper);
    border: 1px solid rgba(154,143,128,0.25); /* soft border, no black stroke */
    border-radius: 14px;
    padding: 16px 18px;
    width: 240px;
    font-family: 'Caveat', cursive;
    font-size: 19px;
    line-height: 1.35;
    color: var(--ink);
    box-shadow: 0 8px 24px rgba(42, 37, 32, 0.12);
    opacity: 0;
    transform: translateY(-6px) scale(0.96);
    pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
    z-index: 11;
  }
  .info-popover.visible {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
  }
  .info-popover::before {
    content: '';
    position: absolute;
    top: -7px;
    left: 14px;
    width: 12px;
    height: 12px;
    background: var(--paper);
    border-left: 1px solid rgba(154,143,128,0.25);
    border-top: 1px solid rgba(154,143,128,0.25);
    transform: rotate(45deg);
  }

  /* Stage */
  .stage {
    height: 100vh;
    overflow: visible; /* allow footer outside stage to show */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 56px 24px 48px;
    position: relative;
    z-index: 1;
  }

  .scene {
    position: relative;
    width: 600px;
    max-width: 100%;
    height: 460px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Camera wrap holds camera SVG + click hint, both positioned absolutely so they share coords */
  .camera-wrap {
    position: relative;
    width: 280px;
    height: 260px;
    z-index: 2;
    cursor: default;
    transition: transform 0.3s ease;
  }
  .camera-wrap:hover {
    transform: translateY(-6px) rotate(0.5deg);
  }

  .camera-svg {
    display: block;
    width: 280px;
    height: auto;
    animation: idle-breath 4.5s ease-in-out infinite;
    transform-origin: center;
  }
  @keyframes idle-breath {
    0%, 100% { transform: translateY(0) rotate(-1deg); }
    50% { transform: translateY(-3px) rotate(-0.4deg); }
  }
  .camera-svg.pressing {
    animation: shutter-press 0.5s ease;
  }
  @keyframes shutter-press {
    0% { transform: translateY(0) rotate(-1deg); }
    25% { transform: translateY(3px) scale(0.985) rotate(-1deg); }
    65% { transform: translateY(-5px) rotate(0deg); }
    100% { transform: translateY(0) rotate(-1deg); }
  }

  .shutter-hit {
    cursor: pointer;
  }
  .shutter-hit:hover #shutter-inner {
    fill: var(--accent-warm);
    transition: fill 0.2s ease;
  }
  .shutter-hit.disabled {
    cursor: wait;
    pointer-events: none;
  }

  /* CLICK HINT — small, positioned just above-left of the shutter button.
     Camera SVG is 280×260; shutter is at SVG (78, 130). Hint shifted 12px left of original. */
  .click-hint {
    position: absolute;
    left: -22px;
    top: 60px;
    width: 90px;
    height: 70px;
    pointer-events: none;
    transition: opacity 0.4s ease;
    z-index: 4;
  }
  .click-hint.hidden { opacity: 0; }
  .click-hint.fade { opacity: 0.45; }

  .click-hint .hint-text {
    position: absolute;
    top: 0;
    left: 8px;
    font-family: 'Caveat', cursive;
    font-size: 23px;
    color: var(--accent-warm);
    transform: rotate(-8deg);
    line-height: 1;
  }
  .click-hint .hint-arrow {
    position: absolute;
    top: 22px;
    left: 30px;
    width: 55px;
    height: auto;
    display: block;
    user-select: none;
    -webkit-user-drag: none;
  }

  /* Polaroid */
  .polaroid {
    position: absolute;
    width: 180px;
    background: var(--paper);
    padding: 10px 10px 38px 10px;
    box-shadow:
      0 1px 2px rgba(42, 37, 32, 0.08),
      0 8px 24px rgba(42, 37, 32, 0.15);
    border-radius: 2px;
    z-index: 1;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -25%) rotate(0deg) scale(0.92);
    opacity: 0;
    pointer-events: none;
    transition: transform 0.9s cubic-bezier(0.25, 1.0, 0.5, 1.0), opacity 0.4s ease;
  }
  .polaroid.emerged {
    opacity: 1;
    transform: translate(-50%, -130%) rotate(-1deg) scale(1);
  }
  .polaroid.settled {
    z-index: 3;
    transform: translate(60%, -45%) rotate(7deg) scale(1);
    transition: transform 1.0s cubic-bezier(0.34, 1.05, 0.64, 1);
    pointer-events: auto;
  }

  .polaroid-photo {
    width: 160px;
    height: 160px;
    background: #1a1814;
    overflow: hidden;
    position: relative;
    border-radius: 1px;
  }
  .polaroid-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: contrast(1.05) saturate(0.92) brightness(1.02);
  }
  /* Veil DEFAULTS to opaque white; .developed fades it away */
  .polaroid-photo .develop-veil {
    position: absolute;
    inset: 0;
    background: var(--paper);
    z-index: 2;
    opacity: 1;
    transition: opacity 1.8s ease;
  }
  .polaroid-photo.developed .develop-veil {
    opacity: 0;
  }

  /* Stamp — smaller font so longest phrase fits with heart */
  .stamp {
    position: absolute;
    bottom: 8px;
    left: 4px;
    right: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    font-family: 'Caveat', cursive;
    font-size: 16px;
    color: var(--ink);
    opacity: 0;
    transform: rotate(-1.5deg) scale(0.8);
    transition: opacity 0.3s ease, transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
    line-height: 1.1;
    white-space: nowrap;
  }
  .stamp.visible {
    opacity: 0.92;
    transform: rotate(-1.5deg) scale(1);
  }
  .stamp svg {
    width: 12px;
    height: 12px;
    flex-shrink: 0;
    transform: translateY(0);
  }

  .flash {
    position: fixed;
    inset: 0;
    background: white;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
  }
  .flash.fire {
    animation: flash-fire 0.45s ease-out;
  }
  @keyframes flash-fire {
    0% { opacity: 0; }
    15% { opacity: 0.8; }
    100% { opacity: 0; }
  }

  .actions {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 16px;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.5s ease 0.3s;
    pointer-events: none;
    flex-wrap: wrap;
    z-index: 5;
  }
  .actions.visible {
    opacity: 1;
    pointer-events: auto;
  }
  .action-btn {
    background: transparent;
    border: 1.5px solid var(--ink);
    padding: 9px 22px;
    font-family: 'Caveat', cursive;
    font-size: 20px;
    color: var(--ink);
    cursor: pointer;
    border-radius: 100px;
    transition: all 0.2s ease;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .action-btn:hover {
    background: var(--ink);
    color: var(--cream);
    transform: translateY(-2px);
  }
  .action-btn.primary {
    background: var(--ink);
    color: var(--cream);
  }
  .action-btn.primary:hover {
    background: var(--sage-shadow);
    border-color: var(--sage-shadow);
  }

  .error-msg {
    position: fixed;
    bottom: 48px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Caveat', cursive;
    font-size: 21px;
    color: var(--accent-warm);
    text-align: center;
    max-width: 320px;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
    z-index: 20;
    background: var(--paper);
    padding: 12px 20px;
    border-radius: 16px;
    box-shadow: 0 4px 16px rgba(42,37,32,0.12);
    white-space: nowrap;
  }
  .error-msg.visible { opacity: 1; }
  .error-msg span { display: block; font-size: 16px; color: var(--ink-faded); margin-top: 4px; }

  #video {
    position: fixed;
    bottom: 0;
    right: 0;
    width: 2px;
    height: 2px;
    opacity: 0.01;
    pointer-events: none;
    z-index: -1;
  }

  footer {
    position: absolute;
    bottom: 4px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Caveat', cursive;
    font-size: 16px;
    color: var(--ink-soft);
    text-align: center;
    z-index: 5;
    opacity: 0.75;
  }
  footer span { color: var(--accent-warm); }

  @media (max-width: 540px) {
    .top-controls { top: 18px; left: 16px; }
    .icon-btn { width: 32px; height: 32px; }
    .icon-btn svg { width: 16px; height: 16px; }
    .info-btn { font-size: 15px; }
    .info-popover { width: 200px; font-size: 16px; }

    /* Stage: no overflow hidden on mobile so polaroid doesn't get clipped */
    .stage {
      overflow: visible;
      align-items: flex-start;
      padding: 80px 16px 140px;
    }

    .scene { height: 320px; width: 100%; }
    .camera-wrap { width: 190px; height: 176px; }
    .camera-svg { width: 190px; }

    /* Hide click hint on mobile — not needed */
    .click-hint { display: none; }

    /* Polaroid stays within scene — no offset beyond scene width */
    .polaroid { width: 130px; padding: 8px 8px 30px 8px; }
    .polaroid-photo { width: 114px; height: 114px; }
    .polaroid.settled {
      transform: translate(20%, -50%) rotate(6deg) scale(1);
    }

    /* CTAs fixed to bottom — stacked vertically, clear of footer */
    .actions {
      position: fixed;
      bottom: 48px;
      left: 0; right: 0;
      transform: none;
      flex-direction: column;
      gap: 10px;
      padding: 0 24px;
      width: 100%;
    }
    .action-btn { width: 100%; justify-content: center; font-size: 18px; }

    .stamp { font-size: 13px; }
    footer { font-size: 15px; bottom: 16px; }
  }
</style>
</head>
<body>

<div class="paper-grain"></div>

<div class="top-controls">
  <button class="icon-btn" id="soundToggle" aria-label="toggle sound">
    <svg id="soundOnIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" fill="currentColor" stroke="currentColor"/>
      <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
    </svg>
    <svg id="soundOffIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" fill="currentColor" stroke="currentColor"/>
      <line x1="22" y1="9" x2="16" y2="15"/>
      <line x1="16" y1="9" x2="22" y2="15"/>
    </svg>
  </button>
  <button class="icon-btn info-btn" id="infoBtn" aria-label="about this project">i</button>
  <div class="info-popover" id="infoPopover">
    a side project i built to remind you to smile today
  </div>
</div>

<div class="stage">
  <div class="scene" id="scene">

    <div class="camera-wrap" id="cameraWrap">
      <svg class="camera-svg" id="camera" viewBox="0 0 280 260" xmlns="http://www.w3.org/2000/svg" aria-label="polaroid camera">
        <ellipse cx="140" cy="248" rx="105" ry="6" fill="#2A2520" opacity="0.1"/>

        <path d="
          M 38 38
          Q 36 28, 46 26
          C 90 22, 195 22, 238 26
          Q 246 28, 244 38
          C 248 70, 250 100, 248 135
          C 250 175, 248 208, 240 230
          Q 238 238, 230 238
          C 192 242, 88 242, 50 238
          Q 40 238, 38 230
          C 30 200, 30 165, 32 135
          C 30 100, 32 65, 38 38
          Z
        " fill="#B5C4A4" stroke="#2A2520" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>

        <path d="
          M 42 42
          Q 42 32, 50 32
          C 92 28, 192 28, 232 32
          Q 240 32, 240 42
          C 244 72, 246 102, 244 135
          C 246 173, 244 205, 236 226
          Q 234 232, 228 232
          C 192 236, 88 236, 52 232
          Q 44 232, 42 226
          C 34 198, 34 165, 36 135
          C 34 102, 36 68, 42 42
          Z
        " fill="none" stroke="#2A2520" stroke-width="0.6" opacity="0.25"/>

        <path d="M 105 38 Q 103 130, 108 235" stroke="#2A2520" stroke-width="1.5" fill="none" opacity="0.55" stroke-linecap="round"/>

        <line x1="62" y1="32" x2="218" y2="32" stroke="#2A2520" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>

        <rect x="125" y="46" width="28" height="56" rx="13" fill="#FDFBF4" stroke="#2A2520" stroke-width="1.8"/>
        <rect x="131" y="54" width="16" height="40" rx="7" fill="#FFFFFF" opacity="0.9"/>

        <rect x="62" y="58" width="28" height="22" rx="4" fill="#FDFBF4" stroke="#2A2520" stroke-width="1.8"/>
        <rect x="69" y="64" width="14" height="10" rx="1" fill="#2A2520"/>

        <ellipse cx="196" cy="68" rx="9" ry="13" fill="none" stroke="#2A2520" stroke-width="1.5" opacity="0.9"/>
        <circle cx="196" cy="62" r="2.5" fill="#2A2520"/>
        <circle cx="196" cy="74" r="2.5" fill="#2A2520"/>

        <g class="shutter-hit" id="shutterBtn">
          <circle cx="78" cy="130" r="20" fill="transparent"/>
          <circle cx="78" cy="130" r="11" fill="#FDFBF4" stroke="#2A2520" stroke-width="1.8"/>
          <circle id="shutter-inner" cx="78" cy="130" r="5.5" fill="#FDFBF4" stroke="#2A2520" stroke-width="1"/>
        </g>

        <circle cx="172" cy="158" r="62" fill="#B5C4A4" stroke="#2A2520" stroke-width="2"/>
        <circle cx="172" cy="158" r="50" fill="#FDFBF4" stroke="#2A2520" stroke-width="1.5"/>
        <circle cx="172" cy="158" r="38" fill="#B5C4A4" stroke="#2A2520" stroke-width="1.5"/>
        <circle cx="172" cy="158" r="26" fill="#2A2520" stroke="#2A2520" stroke-width="1.5"/>
        <path d="M 158 148 Q 150 158, 158 170" stroke="#FDFBF4" stroke-width="3" fill="none" stroke-linecap="round"/>
        <rect x="152" y="148" width="11" height="11" rx="1.5" fill="#FDFBF4"/>

        <g transform="translate(218, 52) rotate(8)" opacity="0.9">
          <path d="M 0 -10 Q 1.5 -2, 10 0 Q 1.5 2, 0 10 Q -1.5 2, -10 0 Q -1.5 -2, 0 -10 Z"
                fill="#2A2520" stroke="#2A2520" stroke-width="0.5" stroke-linejoin="round"/>
        </g>
        <circle cx="232" cy="44" r="1.4" fill="#2A2520" opacity="0.7"/>
      </svg>

      <!-- CLICK HINT — handwritten "click!" with hand-drawn arrow PNG pointing at the shutter -->

      </div>
      <div class="stamp" id="polaroidStamp">
        <span id="stampText"></span>
        <svg viewBox="0 0 24 24" fill="none" stroke="#2A2520" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 21s-7-4.5-9.5-9C1 8.5 3 4.5 7 4.5c2 0 3.5 1 5 3 1.5-2 3-3 5-3 4 0 6 4 4.5 7.5C19 16.5 12 21 12 21z"/>
        </svg>
      </div>
    </div>

    <div class="actions" id="actions">
      <a href="#" class="action-btn primary" id="downloadBtn" download="polaroid-photo.png">↓ download</a>
      <button class="action-btn" id="retakeBtn">take another?</button>
    </div>

    <div class="error-msg" id="errorMsg">
      i need camera access to work :(
      <span>check your browser permissions and try again</span>
    </div>

  </div>

  <footer>made with <span>♡</span> by bb</footer>

</div>

<div class="flash" id="flash"></div>

<video id="video" autoplay playsinline muted></video>

<script>
  // ===== STATE — two-state shutter =====
  // mode: 'needs-permission' | 'ready' | 'busy'
  const state = {
    soundOn: true,
    stream: null,
    videoReady: false,
    mode: 'needs-permission',
  };

  const phrases = [
    "save this one for later",
    "look at you, look at you",
    "you look so good today",
    "okay but the lighting tho",
    "in my soft era, clearly",
  ];

  const camera = document.getElementById('camera');
  const cameraWrap = document.getElementById('cameraWrap');
  const shutterBtn = document.getElementById('shutterBtn');
  const polaroid = document.getElementById('polaroid');
  const polaroidPhoto = document.getElementById('polaroidPhoto');
  const polaroidImg = document.getElementById('polaroidImg');
  const polaroidStamp = document.getElementById('polaroidStamp');
  const stampText = document.getElementById('stampText');
  const flash = document.getElementById('flash');
  const video = document.getElementById('video');
  const actions = document.getElementById('actions');
  const downloadBtn = document.getElementById('downloadBtn');
  const retakeBtn = document.getElementById('retakeBtn');
  const soundToggle = document.getElementById('soundToggle');
  const soundOnIcon = document.getElementById('soundOnIcon');
  const soundOffIcon = document.getElementById('soundOffIcon');
  const infoBtn = document.getElementById('infoBtn');
  const infoPopover = document.getElementById('infoPopover');
  const clickHint = document.getElementById('clickHint');
  const errorMsg = document.getElementById('errorMsg');

  // ===== SOUND — version 1 synthesized shutter =====
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }
  function playShutter() {
    if (!state.soundOn) return;
    try {
      const ctx = getAudioCtx();
      if (ctx.state === 'suspended') ctx.resume();
      const now = ctx.currentTime;

      // Sharp click — square wave high-to-low transient
      const o1 = ctx.createOscillator();
      const g1 = ctx.createGain();
      o1.type = 'square';
      o1.frequency.setValueAtTime(2200, now);
      o1.frequency.exponentialRampToValueAtTime(800, now + 0.04);
      g1.gain.setValueAtTime(0.0001, now);
      g1.gain.exponentialRampToValueAtTime(0.18, now + 0.005);
      g1.gain.exponentialRampToValueAtTime(0.0001, now + 0.05);
      o1.connect(g1).connect(ctx.destination);
      o1.start(now); o1.stop(now + 0.05);

      // Low thud — sine wave for mechanism return
      const o2 = ctx.createOscillator();
      const g2 = ctx.createGain();
      o2.type = 'sine';
      o2.frequency.setValueAtTime(180, now + 0.06);
      o2.frequency.exponentialRampToValueAtTime(80, now + 0.12);
      g2.gain.setValueAtTime(0.0001, now + 0.06);
      g2.gain.exponentialRampToValueAtTime(0.15, now + 0.07);
      g2.gain.exponentialRampToValueAtTime(0.0001, now + 0.13);
      o2.connect(g2).connect(ctx.destination);
      o2.start(now + 0.06); o2.stop(now + 0.13);

      // White noise burst for "fwip" of mechanism
      const bufferSize = ctx.sampleRate * 0.08;
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2);
      }
      const noise = ctx.createBufferSource();
      noise.buffer = buffer;
      const ng = ctx.createGain();
      ng.gain.value = 0.08;
      const filter = ctx.createBiquadFilter();
      filter.type = 'highpass';
      filter.frequency.value = 1200;
      noise.connect(filter).connect(ng).connect(ctx.destination);
      noise.start(now + 0.01);
    } catch (e) {}
  }

  soundToggle.addEventListener('click', () => {
    state.soundOn = !state.soundOn;
    soundOnIcon.style.display = state.soundOn ? '' : 'none';
    soundOffIcon.style.display = state.soundOn ? 'none' : '';
    soundToggle.setAttribute('aria-label', state.soundOn ? 'sound on' : 'sound off');
  });

  // ===== INFO POPOVER =====
  let infoOpen = false;
  function setInfo(open) {
    infoOpen = open;
    infoPopover.classList.toggle('visible', open);
  }
  infoBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    setInfo(!infoOpen);
  });
  document.addEventListener('click', (e) => {
    if (infoOpen && !infoPopover.contains(e.target) && e.target !== infoBtn) {
      setInfo(false);
    }
  });

  // ===== WEBCAM PERMISSION FLOW =====
  // First click: request permission only. Once granted, mode becomes 'ready'.
  // Subsequent clicks (when mode === 'ready'): take the photo.
  async function requestPermission() {
    try {
      state.stream = await navigator.mediaDevices.getUserMedia({
        video: { width: { ideal: 720 }, height: { ideal: 720 }, facingMode: 'user' },
        audio: false,
      });
      video.srcObject = state.stream;
      await video.play().catch(() => {});

      // Wait for actual video frame data
      await new Promise((resolve, reject) => {
        const timeout = setTimeout(() => reject(new Error('video timeout')), 8000);
        const check = () => {
          if (video.readyState >= 2 && video.videoWidth > 0 && video.videoHeight > 0) {
            clearTimeout(timeout);
            resolve();
          } else {
            requestAnimationFrame(check);
          }
        };
        check();
      });
      // Warmup frames
      for (let i = 0; i < 4; i++) {
        await new Promise(r => requestAnimationFrame(r));
      }
      state.videoReady = true;
      return true;
    } catch (err) {
      console.error('permission denied or camera error', err);
      errorMsg.classList.add('visible');
      setTimeout(() => errorMsg.classList.remove('visible'), 4500);
      return false;
    }
  }

  function captureFrame() {
    if (!video.videoWidth || !video.videoHeight) return null;
    const canvas = document.createElement('canvas');
    const size = 720;
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext('2d');
    const vw = video.videoWidth, vh = video.videoHeight;
    const side = Math.min(vw, vh);
    const sx = (vw - side) / 2, sy = (vh - side) / 2;
    ctx.translate(size, 0);
    ctx.scale(-1, 1);
    try {
      ctx.drawImage(video, sx, sy, side, side, 0, 0, size, size);
    } catch (e) { return null; }
    return canvas.toDataURL('image/png');
  }

  function buildDownloadablePolaroid(photoDataUrl, phrase) {
    return new Promise((resolve, reject) => {
      const canvas = document.createElement('canvas');
      const W = 600, H = 720;
      canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext('2d');

      ctx.fillStyle = '#FDFBF4';
      ctx.fillRect(0, 0, W, H);
      const grain = ctx.createImageData(W, H);
      for (let i = 0; i < grain.data.length; i += 4) {
        const v = 250 + Math.random() * 5 - 2;
        grain.data[i] = v;
        grain.data[i+1] = v - 2;
        grain.data[i+2] = v - 8;
        grain.data[i+3] = 8;
      }
      ctx.putImageData(grain, 0, 0);

      const img = new Image();
      img.onload = () => {
        try {
          const padX = 36, padTop = 36;
          const photoSize = W - padX * 2;
          ctx.drawImage(img, padX, padTop, photoSize, photoSize);

          ctx.save();
          ctx.globalAlpha = 0.05;
          ctx.fillStyle = '#C97D5D';
          ctx.fillRect(padX, padTop, photoSize, photoSize);
          ctx.restore();

          const margin_y = padTop + photoSize + (H - padTop - photoSize - padX) / 2;
          ctx.save();
          ctx.translate(W/2, margin_y);
          ctx.rotate(-1.5 * Math.PI / 180);

          // Smaller font that fits all phrases (proportionally same as on-screen 16px)
          ctx.fillStyle = '#2A2520';
          ctx.font = '600 36px "Caveat", cursive';
          ctx.textBaseline = 'middle';
          const heartSize = 24;
          const gap = 10;
          const textWidth = ctx.measureText(phrase).width;
          const totalWidth = textWidth + gap + heartSize;
          const startX = -totalWidth / 2;

          ctx.textAlign = 'left';
          ctx.fillText(phrase, startX, 0);

          // Outlined heart matching the SVG one
          drawHeart(ctx, startX + textWidth + gap, -heartSize/2, heartSize);

          ctx.restore();
          resolve(canvas.toDataURL('image/png'));
        } catch (e) { reject(e); }
      };
      img.onerror = () => reject(new Error('image load failed'));
      img.src = photoDataUrl;
    });
  }

  function drawHeart(ctx, x, y, size) {
    ctx.save();
    ctx.translate(x + size/2, y + size/2);
    const s = size / 24;
    ctx.scale(s, s);
    ctx.strokeStyle = '#2A2520';
    ctx.lineWidth = 2 / s * 1.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    // Heart path matching the SVG: M12 21s-7-4.5-9.5-9C1 8.5 3 4.5 7 4.5c2 0 3.5 1 5 3 1.5-2 3-3 5-3 4 0 6 4 4.5 7.5C19 16.5 12 21 12 21z
    // Recentered around (0,0) with original at (12, 12.5)
    ctx.moveTo(0, 8.5);
    ctx.bezierCurveTo(-7, 4, -11, -1, -9.5, -3.5);
    ctx.bezierCurveTo(-9, -7, -5, -8, -5, -8);
    ctx.bezierCurveTo(-3, -8, -1.5, -7, 0, -5);
    ctx.bezierCurveTo(1.5, -7, 3, -8, 5, -8);
    ctx.bezierCurveTo(9, -8, 11, -4, 9.5, -0.5);
    ctx.bezierCurveTo(7, 4, 0, 8.5, 0, 8.5);
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
  }

  // ===== MAIN — two-step shutter =====
  async function handleShutterClick() {
    if (state.mode === 'busy') return;

    if (state.mode === 'needs-permission') {
      // First click: request permission only, no sound, no capture sequence
      shutterBtn.classList.add('disabled');
      const granted = await requestPermission();
      shutterBtn.classList.remove('disabled');

      if (granted) {
        state.mode = 'ready';
        // Auto-continue: kick off the capture sequence right after permission granted.
        // No second click needed.
        await takePhoto();
      }
      return;
    }

    if (state.mode === 'ready') {
      await takePhoto();
    }
  }

  async function takePhoto() {
    state.mode = 'busy';
    clickHint.classList.add('hidden');
    actions.classList.remove('visible');

    // EVERYTHING happens immediately on click: sound, press animation, flash, capture
    playShutter();
    camera.classList.add('pressing');

    flash.classList.remove('fire');
    void flash.offsetWidth;
    flash.classList.add('fire');

    // Brief moment for flash to peak before capturing the frame
    await new Promise(r => setTimeout(r, 80));

    let photoDataUrl = captureFrame();
    if (!photoDataUrl) {
      await new Promise(r => setTimeout(r, 200));
      photoDataUrl = captureFrame();
    }

    setTimeout(() => camera.classList.remove('pressing'), 500);

    if (!photoDataUrl) {
      errorMsg.classList.add('visible');
      setTimeout(() => errorMsg.classList.remove('visible'), 4500);
      state.mode = 'ready';
      clickHint.classList.remove('hidden');
      return;
    }

    const phrase = phrases[Math.floor(Math.random() * phrases.length)];

    // Pre-load the polaroid image content while we wait
    polaroidImg.src = photoDataUrl;
    stampText.textContent = phrase;

    // 1.5s anticipation pause — capture has happened, but polaroid hasn't emerged yet.
    // The camera "thinks" before ejecting the print, like a real polaroid.
    await new Promise(r => setTimeout(r, 1500));

    // Stage 1: emerge straight up
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        polaroid.classList.add('emerged');
      });
    });

    // Stage 2: drift down-right to settled position
    setTimeout(() => {
      polaroid.classList.add('settled');
    }, 1400);

    // Develop the photo
    setTimeout(() => {
      polaroidPhoto.classList.add('developed');
    }, 600);

    // Stamp lands
    setTimeout(() => {
      polaroidStamp.classList.add('visible');
    }, 2600);

    // Build downloadable composite
    try {
      const downloadUrl = await buildDownloadablePolaroid(photoDataUrl, phrase);
      downloadBtn.href = downloadUrl;
      downloadBtn.download = 'polaroid-photo.png';
    } catch (e) {
      downloadBtn.href = photoDataUrl;
      downloadBtn.download = 'polaroid-photo.png';
    }

    setTimeout(() => {
      actions.classList.add('visible');
      // Don't reset mode here — user clicks "take another" to reset
    }, 3000);
  }

  // RESET — clean slate, user clicks shutter themselves
  function reset() {
    polaroid.classList.remove('emerged', 'settled');
    polaroidPhoto.classList.remove('developed');
    polaroidStamp.classList.remove('visible');
    actions.classList.remove('visible');
    clickHint.classList.remove('hidden', 'fade');
    // mode goes back to 'ready' (permission already granted)
    state.mode = 'ready';
  }

  shutterBtn.addEventListener('click', handleShutterClick);
  retakeBtn.addEventListener('click', reset);

  window.addEventListener('beforeunload', () => {
    if (state.stream) state.stream.getTracks().forEach(t => t.stop());
  });

  // Soft fade of click hint after a while if untouched
  setTimeout(() => {
    if (state.mode !== 'busy' && !polaroid.classList.contains('emerged')) {
      clickHint.classList.add('fade');
    }
  }, 8000);
</script>

</body>
</html>
